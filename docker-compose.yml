services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: eval
      POSTGRES_PASSWORD: eval_pwd
      POSTGRES_DB: teaching_eval
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval -d teaching_eval"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh apps/api/docker-entrypoint.sh
    environment:
      DATABASE_URL: postgresql://eval:eval_pwd@postgres:5432/teaching_eval?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: teaching-eval
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      SEED_ADMIN_ACCOUNT: ${SEED_ADMIN_ACCOUNT:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # ⚠ 改成浏览器能访问到的地址：http://<服务器IP>:4000/api/v1
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    command: pnpm --filter @app/web start
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
  miniodata:
