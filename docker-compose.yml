services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: eval
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eval_pwd}
      POSTGRES_DB: teaching_eval
    # 安全（SECURITY_REVIEW H2）：不向宿主机发布端口，仅容器内网可达。
    # 如需本机调试，临时改为 ["127.0.0.1:5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval -d teaching_eval"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pwd_change_me}
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh apps/api/docker-entrypoint.sh
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://eval:${POSTGRES_PASSWORD:-eval_pwd}@postgres:5432/teaching_eval?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pwd_change_me}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: teaching-eval
      API_PORT: 4000
      # 生产必须在 .env 设置强随机值，否则 api 拒绝启动（main.ts assertSecrets）
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      # 可选：限定 CORS 来源，如 http://172.17.23.37:3000
      WEB_ORIGIN: ${WEB_ORIGIN:-}
      SEED_ADMIN_ACCOUNT: ${SEED_ADMIN_ACCOUNT:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # ⚠ 改成浏览器能访问到的地址：http://<服务器IP>:4000/api/v1
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    command: pnpm --filter @app/web start
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
  miniodata:
